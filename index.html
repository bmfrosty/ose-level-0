<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSE 0-Level Character Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #config {
            text-align: center;
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 50px;
            padding: 5px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center;">OSE 0-Level Character Generator</h1>
    <div id="config">
        Minimums:<br>
        <label for="strMin">STR:</label>
        <input type="number" id="strMin" value="3" min="3" max="18">
        <label for="dexMin">DEX:</label>
        <input type="number" id="dexMin" value="3" min="3" max="18">
        <label for="conMin">CON:</label>
        <input type="number" id="conMin" value="3" min="3" max="18"><br>
        <label for="intMin">INT:</label>
        <input type="number" id="intMin" value="3" min="3" max="18">
        <label for="wisMin">WIS:</label>
        <input type="number" id="wisMin" value="3" min="3" max="18">
        <label for="chaMin">CHA:</label>
        <input type="number" id="chaMin" value="3" min="3" max="18"><br><br>
        <label for="toughGuys">
            <input type="checkbox" id="toughGuys"> Tough Guys (Requires STR/DEX/INT/WIS ≥ 13 and HP ≥ 2)
        </label><br>
        <button id="generateButton" onclick="generate0LevelCharacter()">Generate 0-Level Character</button>
        <button id="canvasPdfButton" onclick="generateCanvasPDF()" style="background-color: #9C27B0;">Generate PDF Character Sheet</button>
        <button id="canvasBulkPdfButton" onclick="generateCanvasBulkPDF()" style="background-color: #E91E63;">Generate 4 Character PDF</button>
    </div>

    <div id="result"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="background-tables.js"></script>
    <script src="names-tables.js"></script>
    <script src="dice-utils.js"></script>
    <script src="ose-modifiers.js"></script>
    <script src="character-utils.js"></script>
    <script src="character-display.js"></script>
    <script src="main-generator.js"></script>
    <script src="pdf-generator.js"></script>
    <script src="canvas-generator.js"></script>
</body>
</html>
